name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-json:
    name: Validate JSON files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all JSON files are valid
        run: |
          find .claude -name "*.json" | while read f; do
            echo "Validating $f"
            python3 -m json.tool "$f" > /dev/null && echo "  ✓ OK" || { echo "  ✗ INVALID"; exit 1; }
          done

  validate-python:
    name: Validate Python syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Check Python files compile
        run: |
          find .claude -name "*.py" | while read f; do
            echo "Checking $f"
            python3 -m py_compile "$f" && echo "  ✓ OK" || { echo "  ✗ SYNTAX ERROR"; exit 1; }
          done

  validate-structure:
    name: Validate plugin structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files exist
        run: |
          required=(
            ".claude/launch.json"
            ".claude/plugins/code-review/.claude-plugin/plugin.json"
            ".claude/plugins/code-review/commands/code-review.md"
            ".claude/plugins/security-guidance/.claude-plugin/plugin.json"
            ".claude/plugins/security-guidance/hooks/hooks.json"
            ".claude/plugins/security-guidance/hooks/security_reminder_hook.py"
          )
          for f in "${required[@]}"; do
            if [ -f "$f" ]; then
              echo "✓ $f"
            else
              echo "✗ MISSING: $f"
              exit 1
            fi
          done
